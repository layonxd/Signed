<!DOCTYPE html>
<html>
<head>
    <title>My Uploads - Media Server</title>
    <style>
        body { font-family: Arial; max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        .back-btn { background: #6c757d; color: white; padding: 8px 16px; border: none; cursor: pointer; border-radius: 4px; }
        .upload-btn { background: #28a745; color: white; padding: 8px 16px; border: none; cursor: pointer; border-radius: 4px; margin-left: 10px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .image-card { border: 1px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; position: relative; }
        .image-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; cursor: pointer; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .delete-btn:hover { background: #c82333; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .empty { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h2> My Uploads</h2>
        <div>
            <button class="upload-btn" onclick="location.href='/upload.html'">+ Upload New</button>
            <button class="back-btn" onclick="goBack()"> Back to Dashboard</button>
        </div>
    </div>
    
    <div id="gallery" class="gallery">
        <div class="loading">Loading your images...</div>
    </div>

    <script>
        async function loadMyImages() {
            try {
                const response = await fetch('/images/self', {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    const error = await response.text();
                    document.getElementById('gallery').innerHTML = `<div class="empty">${error}</div>`;
                    return;
                }
                
                const images = await response.json();
                
                if (images.length === 0) {
                    document.getElementById('gallery').innerHTML = `
                        <div class="empty">
                            <p>You haven't uploaded any images yet.</p>
                            <button onclick="location.href='/upload.html'">Upload Your First Image</button>
                        </div>
                    `;
                    return;
                }
                
                displayImages(images);
                
            } catch (error) {
                console.error('Error loading images:', error);
                document.getElementById('gallery').innerHTML = '<div class="empty">Failed to load your images.</div>';
            }
        }
        
        function displayImages(images) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = images.map(img => `
                <div class="image-card">
                    <img 
                        src="/images/${img.id}" 
                        alt="${img.filename}"
                        onclick="window.open('/images/${img.id}', '_blank')"
                        title="Click to open full size"
                    />
                    <p><strong>${img.filename}</strong></p>
                    <small>Size: ${(img.size / 1024).toFixed(1)} KB</small>
                    <br>
                    <small>Uploaded: ${new Date(img.uploadTime).toLocaleDateString()}</small>
                    <div>
                        <button class="delete-btn" onclick="deleteImage(${img.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function deleteImage(imageId) {
            if (!confirm('Are you sure you want to delete this image?')) {
                return;
            }
            
            try {
                const response = await fetch(`/images/${imageId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    alert('Image deleted successfully!');
                    loadMyImages(); // Refresh the gallery
                } else {
                    const error = await response.text();
                    alert('Failed to delete: ' + error);
                }
            } catch (error) {
                alert('Error deleting image: ' + error.message);
            }
        }
        
        function goBack() {
            window.location.href = '/dashboard.html';
        }
        
        // Load images when page loads
        loadMyImages();
    </script>
</body>
</html>
