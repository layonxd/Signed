<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload · Signed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f8f9fc;
            color: #1e1e2a;
            padding: 24px;
            min-height: 100vh;
        }
        .app-wrapper { max-width: 800px; margin: 0 auto; }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 16px 28px;
            border-radius: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            margin-bottom: 32px;
        }
        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 20px;
            color: #0a0a14;
        }
        .top-bar-brand i { color: #6366f1; font-size: 24px; }
        .top-bar-actions { display: flex; align-items: center; gap: 16px; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f1f3f9;
            padding: 6px 14px 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
        }
        .user-badge i { color: #6366f1; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            background: transparent;
            color: #1e1e2a;
        }
        .btn-primary {
            background: #6366f1;
            color: white;
            box-shadow: 0 2px 6px rgba(99,102,241,0.25);
        }
        .btn-primary:hover {
            background: #4f52e0;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(99,102,241,0.3);
        }
        .btn-ghost { color: #4b5565; }
        .btn-ghost:hover { background: #f1f3f9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .page-header { margin-bottom: 28px; }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-header h1 i { color: #6366f1; }
        .page-header .sub { color: #5b677b; font-size: 15px; margin-top: 4px; }

        .upload-zone {
            background: white;
            border-radius: 32px;
            padding: 48px 32px;
            border: 2px dashed #d0d5dd;
            text-align: center;
            transition: border 0.2s, background 0.2s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-zone.drag-over {
            border-color: #6366f1;
            background: #f0f1fe;
        }
        .upload-zone i { font-size: 48px; color: #a5b0c7; margin-bottom: 12px; display: block; }
        .upload-zone p { font-size: 16px; color: #2d3647; }
        .upload-zone .hint { font-size: 14px; color: #6b788e; margin-top: 4px; }

        .file-info {
            background: white;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid #eef0f4;
            display: none;
        }
        .file-info.show { display: block; }
        .file-info div { font-size: 14px; padding: 2px 0; }
        .file-info strong { color: #1e1e2a; }

        #uploadStatus { margin-top: 16px; font-weight: 500; }
        .status-success { color: #16a34a; }
        .status-error { color: #dc2626; }

        .empty-state {
            background: white;
            border-radius: 28px;
            padding: 48px 28px;
            text-align: center;
            color: #5b677b;
            border: 1px dashed #d0d5dd;
            margin-top: 16px;
        }
        .empty-state i { font-size: 40px; color: #b0b8c9; margin-bottom: 16px; display: block; }

        @media (max-width: 640px) {
            .top-bar { flex-direction: column; gap: 12px; align-items: stretch; }
            .top-bar-actions { justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="top-bar">
            <div class="top-bar-brand">
                <i class="fas fa-cube"></i>
                <span>Media<span style="font-weight:400;color:#6366f1;">Hub</span></span>
            </div>
            <div class="top-bar-actions">
                <span class="user-badge" id="userBadge">
                    <i class="fas fa-user-circle"></i>
                    <span id="userDisplay">Loading...</span>
                </span>
                <button class="btn btn-ghost" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <div id="mainContent">
            <div class="page-header">
                <h1><i class="fas fa-upload"></i> Upload Media</h1>
                <div class="sub">JPEG, PNG, GIF, WebP, MP4, MOV · max 10MB</div>
            </div>
            <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <p><strong>Click or drag & drop</strong></p>
                <div class="hint">Select a file to upload</div>
            </div>
            <input type="file" id="fileInput" style="display:none" accept="image/*,video/*">
            <div class="file-info" id="fileInfo">
                <div><strong>File:</strong> <span id="fileNameDisplay"></span></div>
                <div><strong>Size:</strong> <span id="fileSizeDisplay"></span></div>
                <div><strong>Type:</strong> <span id="fileTypeDisplay"></span></div>
            </div>
            <button class="btn btn-primary" id="uploadBtn" disabled style="padding:12px 32px;font-size:15px;">
                <i class="fas fa-arrow-up"></i> Upload
            </button>
            <div id="uploadStatus"></div>
            <div style="margin-top:24px"><a href="/dashboard.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Dashboard</a></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInfo = document.getElementById('fileInfo');
        const zone = document.getElementById('uploadZone');
        const statusDiv = document.getElementById('uploadStatus');

        async function checkAuth() {
            try {
                const response = await fetch('/auth/check', { credentials: 'include' });
                if (!response.ok) { window.location.href = '/index.html'; return false; }
                const data = await response.json();
                document.getElementById('userDisplay').textContent = data.username;
                if (data.role !== 'CREATOR') {
                    document.getElementById('mainContent').innerHTML = `
                        <div class="empty-state"><i class="fas fa-lock"></i><p>This page is for creators only.</p><a href="/dashboard.html" class="btn btn-ghost">Back to Dashboard</a></div>
                    `;
                    return false;
                }
                return true;
            } catch (e) {
                window.location.href = '/index.html';
                return false;
            }
        }

        function updateFileInfo(file) {
            if (!file) {
                fileInfo.classList.remove('show');
                uploadBtn.disabled = true;
                return;
            }
            document.getElementById('fileNameDisplay').textContent = file.name;
            document.getElementById('fileSizeDisplay').textContent = (file.size / 1024).toFixed(2) + ' KB';
            document.getElementById('fileTypeDisplay').textContent = file.type || 'Unknown';
            fileInfo.classList.add('show');
            uploadBtn.disabled = false;
        }

        fileInput.addEventListener('change', function() {
            if (this.files[0]) updateFileInfo(this.files[0]);
        });

        zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('drag-over');
            if (e.dataTransfer.files[0]) {
                fileInput.files = e.dataTransfer.files;
                updateFileInfo(e.dataTransfer.files[0]);
            }
        });

        uploadBtn.addEventListener('click', async function() {
            const file = fileInput.files[0];
            if (!file) return;
            
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading…';
            statusDiv.className = '';
            this.disabled = true;

            const fd = new FormData();
            fd.append('file', file);
            try {
                const res = await fetch('/images/upload', { method: 'POST', credentials: 'include', body: fd });
                if (res.ok) {
                    statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Upload successful! Redirecting…';
                    statusDiv.className = 'status-success';
                    setTimeout(() => window.location.href = '/my-uploads.html', 1500);
                } else {
                    const err = await res.text();
                    statusDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${err}`;
                    statusDiv.className = 'status-error';
                    this.disabled = false;
                }
            } catch (_) {
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Network error';
                statusDiv.className = 'status-error';
                this.disabled = false;
            }
        });

        async function logout() {
            await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/index.html';
        }

        checkAuth();
    </script>
</body>
</html>
