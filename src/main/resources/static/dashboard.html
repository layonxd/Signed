<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Media Server</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        .logout-btn { background: red; color: white; padding: 10px; border: none; cursor: pointer; }
        
        /* Upload area */
        .upload-section { margin-top: 20px; padding: 20px; border: 2px dashed #ccc; border-radius: 8px; }
        .upload-btn { background: green; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; }
        .upload-btn:disabled { background: gray; cursor: not-allowed; }
        #uploadStatus { margin-top: 10px; font-weight: bold; }

        /* Image gallery */
        .gallery { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .image-card { border: 1px solid #ddd; border-radius: 8px; padding: 10px; width: 200px; }
        .image-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; cursor: pointer; }
        .image-card p { font-size: 12px; margin: 5px 0; color: #555; word-break: break-all; }
    </style>
</head>
<body>
    <h2>Media Server Dashboard</h2>
    <div id="userInfo"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <!-- Upload Section -->
    <div class="upload-section">
        <h3>Upload Image</h3>
        <input type="file" id="fileInput" accept="image/*" />
        <br><br>
        <button class="upload-btn" onclick="uploadImage()">Upload</button>
        <div id="uploadStatus"></div>
    </div>

    <!-- Gallery Section -->
    <div>
        <h3>All Images</h3>
        <button onclick="loadImages()" style="padding: 8px 16px; cursor: pointer;">Refresh</button>
        <div class="gallery" id="gallery">
            <p>Loading images...</p>
        </div>
    </div>
    <a href="/creators.html" class="creators-link">
    <button type="button">View All Creators</button>
    </a>
    <script>
        async function checkAuth() {
            try {
                const response = await fetch('/auth/check', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    window.location.href = '/index.html';
                } else {
                    const data = await response.text();
                    document.getElementById('userInfo').innerHTML = 
                        '<p>Logged in as: <strong>' + data + '</strong></p>';
                }
            } catch (error) {
                window.location.href = '/index.html';
            }
        }

        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('uploadStatus');
            const btn = document.querySelector('.upload-btn');

            // Validate a file was chosen
            if (!fileInput.files[0]) {
                status.style.color = 'red';
                status.textContent = 'Please select a file first.';
                return;
            }

            // Build the form data
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            btn.disabled = true;
            status.style.color = 'black';
            status.textContent = 'Uploading...';

            try {
                const response = await fetch('/images/upload', {
                    method: 'POST',
                    credentials: 'include',  // send session cookie
                    body: formData           // no Content-Type header — browser sets it automatically for FormData
                });

                if (response.ok) {
                    const data = await response.json();
                    status.style.color = 'green';
                    status.textContent = 'Uploaded: ' + data.filename;
                    fileInput.value = '';   // clear the input
                    loadImages();           // refresh gallery
                } else {
                    const err = await response.text();
                    status.style.color = 'red';
                    status.textContent = 'Error: ' + err;
                }
            } catch (error) {
                status.style.color = 'red';
                status.textContent = 'Upload failed: ' + error.message;
            } finally {
                btn.disabled = false;
            }
        }

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<p>Loading...</p>';

            try {
                const response = await fetch('/images', {
                    credentials: 'include'
                });
                const images = await response.json();

                if (images.length === 0) {
                    gallery.innerHTML = '<p>No images uploaded yet.</p>';
                    return;
                }

                // Build a card for each image
                gallery.innerHTML = images.map(img => `
                    <div class="image-card">
                        <img 
                            src="/images/${img.id}" 
                            alt="${img.filename}"
                            onclick="window.open('/images/${img.id}', '_blank')"
                            title="Click to open full size"
                        />
                        <p><strong>${img.filename}</strong></p>
                        <p>By: ${img.uploader}</p>
                        <p>Size: ${(img.size / 1024).toFixed(1)} KB</p>
                    </div>
                `).join('');

            } catch (error) {
                gallery.innerHTML = '<p style="color:red">Failed to load images.</p>';
            }
        }
        
        async function logout() {
            await fetch('/auth/logout', {
                method: 'POST',
                credentials: 'include'
            });
            window.location.href = '/index.html';
        }
        
        // Run on page load
        checkAuth();
        loadImages();
    </script>
</body>
</html>
