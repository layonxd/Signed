<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Content · Signed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f8f9fc;
            color: #1e1e2a;
            padding: 24px;
            min-height: 100vh;
        }
        .app-wrapper { max-width: 1280px; margin: 0 auto; }
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 16px 28px;
            border-radius: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            margin-bottom: 32px;
        }
        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 20px;
            color: #0a0a14;
        }
        .top-bar-brand i { color: #6366f1; font-size: 24px; }
        .top-bar-actions { display: flex; align-items: center; gap: 16px; }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f1f3f9;
            padding: 6px 14px 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
        }
        .user-badge i { color: #6366f1; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            background: transparent;
            color: #1e1e2a;
        }
        .btn-primary {
            background: #6366f1;
            color: white;
            box-shadow: 0 2px 6px rgba(99,102,241,0.25);
        }
        .btn-primary:hover {
            background: #4f52e0;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(99,102,241,0.3);
        }
        .btn-ghost { color: #4b5565; }
        .btn-ghost:hover { background: #f1f3f9; }
        .page-header { margin-bottom: 28px; }
        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-header h1 i { color: #6366f1; }
        .page-header .sub { color: #5b677b; font-size: 15px; margin-top: 4px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
            margin-top: 12px;
        }
        .media-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #f0f2f7;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .media-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px -8px rgba(0,0,0,0.08);
        }
        .media-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #f1f3f9;
            cursor: pointer;
        }
        .media-card .meta { padding: 14px 16px 16px; text-align: left; }
        .media-card .meta p { font-weight: 600; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .media-card .meta small { color: #6b788e; font-size: 12px; }

        .empty-state {
            background: white;
            border-radius: 28px;
            padding: 48px 28px;
            text-align: center;
            color: #5b677b;
            border: 1px dashed #d0d5dd;
            margin-top: 16px;
        }
        .empty-state i { font-size: 40px; color: #b0b8c9; margin-bottom: 16px; display: block; }
        .loading-spinner { text-align: center; padding: 40px 0; color: #6b788e; }
        .loading-spinner i { font-size: 28px; color: #6366f1; margin-bottom: 12px; display: inline-block; }

        @media (max-width: 640px) {
            .top-bar { flex-direction: column; gap: 12px; align-items: stretch; }
            .top-bar-actions { justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="top-bar">
            <div class="top-bar-brand">
                <i class="fas fa-cube"></i>
                <span>Signed</span>
            </div>
            <div class="top-bar-actions">
                <span class="user-badge" id="userBadge">
                    <i class="fas fa-user-circle"></i>
                    <span id="userDisplay">Loading...</span>
                </span>
                <button class="btn btn-ghost" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </header>

        <div id="mainContent">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><div>Loading content...</div></div>
        </div>
    </div>

    <script>
        const content = document.getElementById('mainContent');
        const urlParams = new URLSearchParams(window.location.search);
        const creatorName = urlParams.get('creator');

        async function checkAuth() {
            try {
                const response = await fetch('/auth/check', { credentials: 'include' });
                if (!response.ok) { window.location.href = '/index.html'; return false; }
                const data = await response.json();
                document.getElementById('userDisplay').textContent = data.username;
                return true;
            } catch (e) {
                window.location.href = '/index.html';
                return false;
            }
        }

        async function loadCreatorContent() {
            if (!await checkAuth()) return;
            
            if (!creatorName) {
                content.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>No creator specified.</p><a href="/dashboard.html" class="btn btn-ghost">Back to Dashboard</a></div>`;
                return;
            }

            content.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><div>Loading...</div></div>';
            
            try {
                const r = await fetch('/images', { credentials: 'include' });
                if (!r.ok) throw new Error('No images');
                const all = await r.json();
                const filtered = all.filter(img => img.uploader === creatorName);

                if (filtered.length === 0) {
                    content.innerHTML = `
                        <div class="page-header"><h1><i class="fas fa-user"></i> ${creatorName}</h1><div class="sub">No content yet</div></div>
                        <div class="empty-state"><i class="fas fa-image"></i><p>This creator hasn't uploaded anything yet.</p></div>
                        <div style="margin-top:20px"><a href="/dashboard.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Dashboard</a></div>
                    `;
                    return;
                }

                let gallery = filtered.map(img => `
                    <div class="media-card">
                        <img src="/images/${img.id}" alt="${img.filename}" onclick="window.open('/images/${img.id}','_blank')" />
                        <div class="meta">
                            <p>${img.filename}</p>
                            <small>${(img.size/1024).toFixed(1)} KB</small>
                        </div>
                    </div>
                `).join('');

                content.innerHTML = `
                    <div class="page-header"><h1><i class="fas fa-user"></i> ${creatorName}</h1><div class="sub">Gallery</div></div>
                    <div class="gallery-grid">${gallery}</div>
                    <div style="margin-top:24px"><a href="/dashboard.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Dashboard</a></div>
                `;
            } catch (e) {
                content.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Could not load content.</p></div>`;
            }
        }

        async function logout() {
            await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/index.html';
        }

        loadCreatorContent();
    </script>
</body>
</html>
