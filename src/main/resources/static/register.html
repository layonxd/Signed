<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · Signed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f8f9fc 0%, #eef1f8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .register-container {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
            overflow: hidden;
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            padding: 32px 40px 24px;
            text-align: center;
            border-bottom: 1px solid #f0f2f7;
        }

        .register-header .logo {
            font-size: 28px;
            font-weight: 700;
            color: #0a0a14;
            margin-bottom: 6px;
        }

        .register-header .logo i {
            color: #6366f1;
            margin-right: 8px;
        }

        .register-header p {
            color: #5b677b;
            font-size: 15px;
        }

        .register-body {
            padding: 32px 40px 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1e1e2a;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e7f0;
            border-radius: 14px;
            font-size: 15px;
            transition: all 0.2s;
            font-family: inherit;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
        }

        .form-group input.error {
            border-color: #e53e3e;
        }

        .form-group input.error:focus {
            box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.08);
        }

        .role-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 4px;
        }

        .role-option {
            cursor: pointer;
        }

        .role-option input {
            display: none;
        }

        .role-card {
            border: 2px solid #e2e7f0;
            border-radius: 14px;
            padding: 16px 12px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
            background: white;
        }

        .role-option input:checked + .role-card {
            border-color: #6366f1;
            background: #f8f7ff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
        }

        .role-card:hover {
            border-color: #b0b8c9;
            transform: translateY(-1px);
        }

        .role-option input:checked + .role-card:hover {
            border-color: #6366f1;
        }

        .role-icon {
            font-size: 28px;
            margin-bottom: 6px;
            display: block;
        }

        .role-title {
            font-weight: 600;
            font-size: 14px;
            color: #1e1e2a;
            margin-bottom: 2px;
        }

        .role-desc {
            font-size: 12px;
            color: #6b788e;
            line-height: 1.4;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            font-family: inherit;
            margin-top: 4px;
        }

        .btn-register:hover:not(:disabled) {
            background: #4f52e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .btn-register:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eef0f4;
            font-size: 14px;
            color: #5b677b;
        }

        .login-link a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: slideDown 0.25s ease-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message i {
            font-size: 18px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .message.info {
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        .hidden {
            display: none !important;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 500px) {
            .register-body {
                padding: 24px 20px 32px;
            }
            .register-header {
                padding: 24px 20px 20px;
            }
            .role-options {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .role-card {
                padding: 14px 10px;
            }
            .role-icon {
                font-size: 24px;
            }
        }

        @media (max-width: 380px) {
            .role-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo">
                <i class="fas fa-cube"></i>Signed
            </div>
            <p>Create your free account</p>
        </div>

        <div class="register-body">
            <div id="messageContainer"></div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user" style="color:#6366f1;margin-right:6px;"></i>Username
                    </label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock" style="color:#6366f1;margin-right:6px;"></i>Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Create a password" autocomplete="off">
                </div>

                <div class="form-group">
                    <label style="margin-bottom:10px;">
                        <i class="fas fa-user-tag" style="color:#6366f1;margin-right:6px;"></i>Account Type
                    </label>
                    <div class="role-options">
                        <label class="role-option">
                            <input type="radio" name="role" value="CONSUMER" checked>
                            <div class="role-card">
                                <span class="role-icon">👀</span>
                                <div class="role-title">Consumer</div>
                                <div class="role-desc">View and subscribe</div>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="CREATOR">
                            <div class="role-card">
                                <span class="role-icon">🎨</span>
                                <div class="role-title">Creator</div>
                                <div class="role-desc">Upload and share</div>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-register" id="submitBtn">
                    <i class="fas fa-user-plus" style="margin-right:8px;"></i>Create Account
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="/index.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageContainer = document.getElementById('messageContainer');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Real-time validation feedback
        usernameInput.addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 3) {
                this.classList.add('error');
            } else {
                this.classList.remove('error');
            }
        });

        passwordInput.addEventListener('input', function() {
            if (this.value.length > 0 && this.value.length < 3) {
                this.classList.add('error');
            } else {
                this.classList.remove('error');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const role = document.querySelector('input[name="role"]:checked').value;

            // Clear previous messages
            messageContainer.innerHTML = '';

            // Validate
            if (!username || username.length < 3) {
                showMessage('Username must be at least 3 characters', 'error');
                usernameInput.focus();
                return;
            }

            if (!password || password.length < 3) {
                showMessage('Password must be at least 3 characters', 'error');
                passwordInput.focus();
                return;
            }

            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Creating account...';

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        password,
                        role
                    })
                });

                const message = await response.text();

                if (response.ok) {
                    showMessage(message + ' Redirecting to login…', 'success');
                    form.reset();
                    usernameInput.classList.remove('error');
                    passwordInput.classList.remove('error');

                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 2000);
                } else if (response.status === 409) {
                    showMessage(message, 'error');
                    usernameInput.focus();
                } else {
                    showMessage('Registration failed: ' + message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error. Please check if the server is running.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus" style="margin-right:8px;"></i>Create Account';
            }
        });

        function showMessage(message, type) {
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            messageContainer.innerHTML = `
                <div class="message ${type}">
                    <i class="fas ${icons[type] || icons.info}"></i>
                    <span>${message}</span>
                </div>
            `;

            // Auto-hide after 5 seconds for non-success messages
            if (type !== 'success') {
                setTimeout(() => {
                    const msgDiv = messageContainer.querySelector('.message');
                    if (msgDiv) {
                        msgDiv.style.opacity = '0';
                        msgDiv.style.transition = 'opacity 0.3s';
                        setTimeout(() => {
                            if (messageContainer.contains(msgDiv)) {
                                messageContainer.innerHTML = '';
                            }
                        }, 300);
                    }
                }, 5000);
            }
        }
    </script>
</body>
</html>
