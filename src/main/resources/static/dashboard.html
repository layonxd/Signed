<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Media Server</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        .logout-btn { background: red; color: white; padding: 10px; border: none; cursor: pointer; }
        .video-list { margin-top: 20px; }
        .video-item { margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Media Server Dashboard</h2>
    <div id="userInfo"></div>
    <div id="content">
        <p>Welcome to your media library!</p>
        <div class="video-list">
            <h3>Your Videos</h3>
            <div class="video-item"><a href="/api/video/test.mp4">Sample Video</a></div>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <script>
        // Check if user is logged in when page loads
        async function checkAuth() {
            try {
                const response = await fetch('/auth/check', {
                    method: 'GET',
                    credentials: 'include'  // Send cookies
                });
                
                if (!response.ok) {
                    window.location.href = '/index.html';  // Redirect to login
                } else {
                    const data = await response.text();
                    document.getElementById('userInfo').innerHTML = 
                        '<p>Logged in as: ' + data + '</p>';
                }
            } catch (error) {
                window.location.href = '/index.html';
            }
        }
        
        async function logout() {
            await fetch('/auth/logout', {
                method: 'POST',
                credentials: 'include'
            });
            window.location.href = '/index.html';
        }
        
        checkAuth();  // Verify login when page loads
    </script>
</body>
</html>
