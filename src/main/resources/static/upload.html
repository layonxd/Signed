<!DOCTYPE html>
<html>
<head>
    <title>Upload Image - Media Server</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 0 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        .back-btn { background: #6c757d; color: white; padding: 8px 16px; border: none; cursor: pointer; border-radius: 4px; }
        .upload-area { border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-area.drag-over { border-color: #28a745; background: #f0f9f0; }
        .upload-btn { background: #28a745; color: white; padding: 12px 24px; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        .upload-btn:disabled { background: #ccc; cursor: not-allowed; }
        #fileInfo { margin-top: 20px; padding: 10px; background: #f8f9fa; border-radius: 4px; }
        #status { margin-top: 20px; font-weight: bold; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <h2> Upload New Image</h2>
        <button class="back-btn" onclick="goBack()"> Back</button>
    </div>
    
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <p> Click or drag & drop to upload</p>
        <p style="font-size: 12px; color: #666;">Supports: JPEG, PNG, GIF, WebP, MP4, MOV (Max 10MB)</p>
    </div>
    
    <input type="file" id="fileInput" style="display: none;" accept="image/*,video/*">
    
    <div id="fileInfo" style="display: none;">
        <strong>Selected file:</strong> <span id="fileName"></span>
        <br>
        <strong>Size:</strong> <span id="fileSize"></span>
        <br>
        <strong>Type:</strong> <span id="fileType"></span>
    </div>
    
    <button class="upload-btn" id="uploadBtn" onclick="uploadImage()" disabled>Upload</button>
    
    <div id="status"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadArea = document.getElementById('uploadArea');
        const fileInfo = document.getElementById('fileInfo');
        const status = document.getElementById('status');
        
        // Handle file selection
        fileInput.addEventListener('change', function(e) {
            if (this.files[0]) {
                displayFileInfo(this.files[0]);
                uploadBtn.disabled = false;
            } else {
                fileInfo.style.display = 'none';
                uploadBtn.disabled = true;
            }
        });
        
        // Drag and drop support
        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('drag-over');
        });
        
        uploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
        });
        
        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                displayFileInfo(file);
                uploadBtn.disabled = false;
            }
        });
        
        function displayFileInfo(file) {
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(2) + ' KB';
            document.getElementById('fileType').textContent = file.type || 'Unknown';
            fileInfo.style.display = 'block';
        }
        
        async function uploadImage() {
            const file = fileInput.files[0];
            if (!file) {
                showStatus('Please select a file first.', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            uploadBtn.disabled = true;
            showStatus('Uploading...', 'info');
            
            try {
                const response = await fetch('/images/upload', {
                    method: 'POST',
                    credentials: 'include',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showStatus(` Uploaded successfully: ${data.filename}`, 'success');
                    fileInput.value = '';
                    fileInfo.style.display = 'none';
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/my-uploads.html';
                    }, 2000);
                } else {
                    const error = await response.text();
                    showStatus(` Upload failed: ${error}`, 'error');
                    uploadBtn.disabled = false;
                }
            } catch (error) {
                showStatus(` Error: ${error.message}`, 'error');
                uploadBtn.disabled = false;
            }
        }
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = type === 'error' ? 'error' : (type === 'success' ? 'success' : '');
        }
        
        function goBack() {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
