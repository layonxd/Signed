<!DOCTYPE html>
<html>
<head>
    <title>Login - Media Server</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 50px auto; }
        input { width: 100%; padding: 8px; margin: 5px 0; }
        button { width: 100%; padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
        button:hover { opacity: 0.9; }
        #message { margin-top: 10px; }
        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
        }
        .register-link a {
            color: blue;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .register-btn {
            background: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>Media Server Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <div id="message"></div>
    
    <div class="register-link">
        <p>Don't have an account?</p>
        <button onclick="window.location.href='/register.html'" class="register-btn">Register</button>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password}),
                credentials: 'include'  // Important: Send/receive cookies
            });
            
            if (response.ok) {
                window.location.href = '/dashboard.html';  // Redirect to creators page
            } else {
                const message = await response.text();
                const messageDiv = document.getElementById('message');
                messageDiv.innerText = message;
                messageDiv.style.color = 'red';
            }
        };
    </script>
</body>
</html>
