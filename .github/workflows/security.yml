name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------
  # 1. Build + run tests. Other jobs use `needs:` on this so they
  #    only run once the build/tests pass.
  # ---------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - run: chmod +x mvnw

      - run: ./mvnw clean verify

  # ---------------------------------------------------------------
  # 2. CodeQL - static analysis for Java (SQLi, path traversal, etc.)
  # ---------------------------------------------------------------
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - run: chmod +x mvnw

      - run: ./mvnw clean compile -DskipTests

      - uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------
  # 3. Semgrep - pattern-based static analysis (closest Java
  #    equivalent to Bandit: hardcoded secrets, weak crypto,
  #    string-concatenated SQL, unsafe deserialization, etc.)
  # ---------------------------------------------------------------
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=auto --sarif --output=semgrep-results.sarif
        continue-on-error: true   # don't block the pipeline yet; just report

      - name: Upload results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

 