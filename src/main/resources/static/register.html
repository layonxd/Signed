<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Media Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .register-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .register-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .register-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .role-options {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .role-option {
            flex: 1;
            cursor: pointer;
        }

        .role-option input {
            display: none;
        }

        .role-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .role-option input:checked + .role-card {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
        }

        .role-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .role-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .role-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .role-desc {
            font-size: 12px;
            color: #666;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>🎨 Create Account</h1>
            <p>Join our creative community</p>
        </div>
        
        <div class="register-body">
            <div id="messageContainer"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password">
                </div>
                
                <div class="form-group">
                    <label>Account Type</label>
                    <div class="role-options">
                        <label class="role-option">
                            <input type="radio" name="role" value="CONSUMER" checked>
                            <div class="role-card">
                                <div class="role-icon">👀</div>
                                <div class="role-title">Consumer</div>
                                <div class="role-desc">View and subscribe to creators</div>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="CREATOR">
                            <div class="role-card">
                                <div class="role-icon">🎨</div>
                                <div class="role-title">Creator</div>
                                <div class="role-desc">Upload and share your art</div>
                            </div>
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn-register" id="submitBtn">
                    Create Account
                </button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="/index.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageContainer = document.getElementById('messageContainer');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            
            // Validate input
            if (!username || username.length < 3) {
                showMessage('Username must be at least 3 characters', 'error');
                return;
            }
            
            if (!password || password.length < 3) {
                showMessage('Password must be at least 3 characters', 'error');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Creating account...';
            
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        role: role
                    })
                });
                
                const message = await response.text();
                
                if (response.ok) {
                    // Success - redirect to login page after 2 seconds
                    showMessage(message + ' Redirecting to login...', 'success');
                    
                    // Clear form
                    form.reset();
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 2000);
                } else if (response.status === 409) {
                    // Username already exists
                    showMessage(message, 'error');
                } else {
                    // Other error
                    showMessage('Registration failed: ' + message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error. Please check if the server is running.', 'error');
            } finally {
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Account';
            }
        });
        
        function showMessage(message, type) {
            messageContainer.innerHTML = `
                <div class="message ${type}">
                    ${message}
                </div>
            `;
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                const msgDiv = messageContainer.querySelector('.message');
                if (msgDiv) {
                    msgDiv.style.opacity = '0';
                    setTimeout(() => {
                        if (messageContainer.innerHTML.includes(msgDiv.outerHTML)) {
                            messageContainer.innerHTML = '';
                        }
                    }, 300);
                }
            }, 5000);
        }
        
        // Add real-time validation
        document.getElementById('username').addEventListener('input', (e) => {
            const username = e.target.value;
            if (username.length > 0 && username.length < 3) {
                e.target.style.borderColor = '#e53e3e';
            } else {
                e.target.style.borderColor = '#e0e0e0';
            }
        });
        
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            if (password.length > 0 && password.length < 3) {
                e.target.style.borderColor = '#e53e3e';
            } else {
                e.target.style.borderColor = '#e0e0e0';
            }
        });
    </script>
</body>
</html>
