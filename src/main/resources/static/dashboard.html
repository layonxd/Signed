<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Media Server</title>
    <style>
        body { font-family: Arial; max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        .user-info { font-size: 14px; color: #666; }
        .logout-btn { background: #dc3545; color: white; padding: 8px 16px; border: none; cursor: pointer; border-radius: 4px; }
        .logout-btn:hover { background: #c82333; }
        
        /* Creator Only Buttons */
        .creator-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .creator-btn { background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .creator-btn:hover { background: #218838; }
        
        /* Subscribed Creators Grid */
        .creators-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .creator-card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .creator-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .creator-avatar { width: 80px; height: 80px; background: #007bff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: white; font-size: 32px; font-weight: bold; }
        .creator-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .creator-stats { font-size: 12px; color: #666; }
        
        /* Loading and Empty States */
        .loading { text-align: center; padding: 40px; color: #666; }
        .empty { text-align: center; padding: 40px; color: #999; }
        
        /* Messages */
        .error-message { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h2> Media Server Dashboard</h2>
        <div>
            <span class="user-info" id="userInfo"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Creator Only Buttons (Hidden by default) -->
    <div id="creatorButtons" class="creator-buttons" style="display: none;">
        <button class="creator-btn" onclick="location.href='/my-uploads.html'"> My Uploads</button>
        <button class="creator-btn" onclick="location.href='/upload.html'"> Upload New Image</button>
    </div>

    <!-- Subscribed Creators Section -->
    <div>
        <h3> Creators You Follow</h3>
        <div id="creatorsContainer">
            <div class="loading">Loading creators you follow...</div>
        </div>
    </div>

    <script>
        let currentUserRole = null;
        let currentUsername = null;

        async function checkAuth() {
            try {
                const response = await fetch('/auth/check', {
                    method: 'GET',
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    window.location.href = '/index.html';
                    return;
                }
                
                const data = await response.json();
                currentUsername = data.username;
                currentUserRole = data.role;
                
                document.getElementById('userInfo').innerHTML = `Welcome, <strong>${data.username}`;
                
                // Show creator buttons only for creators
                if (data.role === 'CREATOR') {
                    document.getElementById('creatorButtons').style.display = 'flex';
                }
                
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/index.html';
            }
        }

        async function loadSubscribedCreators() {
            const container = document.getElementById('creatorsContainer');
            container.innerHTML = '<div class="loading">Loading creators you follow...</div>';
            
            try {
                // First, get the list of creators this user subscribes to
                const response = await fetch('/subscriptions/my', {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    container.innerHTML = '<div class="empty">Error loading subscriptions. Please try again.</div>';
                    return;
                }
                
                const subscribedCreatorNames = await response.json();
                
                if (subscribedCreatorNames.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            <p>You're not following any creators yet.</p>
                            <a href="/creators.html"><button style="margin-top: 10px; padding: 8px 16px;">Browse Creators</button></a>
                        </div>
                    `;
                    return;
                }
                
                // Fetch details for each creator
                const creators = [];
                for (const name of subscribedCreatorNames) {
                    const creatorResponse = await fetch(`/auth/user/${name}`, {
                        credentials: 'include'
                    });
                    if (creatorResponse.ok) {
                        const creator = await creatorResponse.json();
                        creators.push(creator);
                    }
                }
                
                displayCreators(creators);
                
            } catch (error) {
                console.error('Error loading subscribed creators:', error);
                container.innerHTML = '<div class="empty">Failed to load creators you follow.</div>';
            }
        }
        
        function displayCreators(creators) {
            const container = document.getElementById('creatorsContainer');
            
            container.innerHTML = `
                <div class="creators-grid">
                    ${creators.map(creator => `
                        <div class="creator-card" onclick="viewCreatorContent('${creator.username}')">
                            <div class="creator-avatar">
                                ${creator.username.charAt(0).toUpperCase()}
                            </div>
                            <div class="creator-name">${creator.username}</div>
                            <div class="creator-stats">Creator</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function viewCreatorContent(creatorUsername) {
            // Store the creator name in sessionStorage and redirect
            sessionStorage.setItem('selectedCreator', creatorUsername);
            window.location.href = `/creator-content.html?creator=${encodeURIComponent(creatorUsername)}`;
        }
        
        async function logout() {
            await fetch('/auth/logout', {
                method: 'POST',
                credentials: 'include'
            });
            window.location.href = '/index.html';
        }
        
        // Run on page load
        checkAuth();
        loadSubscribedCreators();
    </script>
</body>
</html>
