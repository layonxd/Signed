name: Security Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ---------------------------------------------------------------
  # 1. Build + run tests. Other jobs use `needs:` on this so they
  #    only run once the build/tests pass.
  # ---------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - run: chmod +x mvnw

      - run: ./mvnw clean verify

  # ---------------------------------------------------------------
  # 2. CodeQL - static analysis for Java (SQLi, path traversal, etc.)
  # ---------------------------------------------------------------
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - run: chmod +x mvnw

      - run: ./mvnw clean compile -DskipTests

      - uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------
  # 3. Semgrep - pattern-based static analysis (closest Java
  #    equivalent to Bandit: hardcoded secrets, weak crypto,
  #    string-concatenated SQL, unsafe deserialization, etc.)
  # ---------------------------------------------------------------
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=auto --sarif --output=semgrep-results.sarif
        continue-on-error: true   # don't block the pipeline yet; just report

      - name: Upload results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif

  # ---------------------------------------------------------------
  # 4. OWASP Dependency-Check - known CVEs in your Maven deps
  #    (Postgres driver, Spring Boot, spring-security-crypto, etc.)
  # ---------------------------------------------------------------
  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - run: chmod +x mvnw

      # NVD_API_KEY is optional but strongly recommended - without it the
      # NVD database download is heavily rate-limited and this step can
      # take 30+ minutes. Get a free key at
      # https://nvd.nist.gov/developers/request-an-api-key
      # then add it as a repo secret named NVD_API_KEY
      # (Settings -> Secrets and variables -> Actions).
      - name: Run OWASP Dependency-Check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -Dnvd.api.key=${{ secrets.NVD_API_KEY }} \
            -DfailBuildOnCVSS=9

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7

  # ---------------------------------------------------------------
  # 5. OWASP ZAP baseline scan - tests the *running* app for
  #    common web vulns (XSS, missing security headers, cookie
  #    flags, etc.) by hitting it like a real client would.
  #
  #    Uses your actual docker-compose.yml + Dockerfile so this
  #    tests the same image/setup that would be deployed.
  # ---------------------------------------------------------------
  zap-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start the app stack
        env:
          POSTGRES_PASSWORD: ci_password
          SPRING_DATASOURCE_PASSWORD: ci_password
        run: |
          mkdir -p uploads
          docker compose up -d --build

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ -o /dev/null; then
              echo "App is up"
              break
            fi
            sleep 2
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          fail_action: false   # flip to true once you've triaged baseline findings
          cmd_options: '-a'    # include alpha-quality passive rules

      - name: Show app logs on failure
        if: failure()
        run: docker compose logs app

      - name: Tear down stack
        if: always()
        run: docker compose down -v